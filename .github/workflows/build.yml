name: Build PDF Merger (Windows)

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run Pytest
        run: |
          pytest tests/

      - name: Build Executable with Nuitka
        shell: bash
        run: |
          PYMUPDF_DIR=$(python -c "import pymupdf, os; print(os.path.dirname(pymupdf.__file__))")
          FITZ_DIR=$(python -c "import fitz, os; print(os.path.dirname(fitz.__file__))")
          python -m nuitka --low-memory --standalone --windows-console-mode=disable --enable-plugin=pyside6 --nofollow-import-to=pymupdf --nofollow-import-to=fitz --include-data-dir=translations=translations --include-data-files="source/style_dark.qss=source/style_dark.qss" --include-data-files="source/style_light.qss=source/style_light.qss" --include-data-files="source/bookmark.svg=source/bookmark.svg" --output-dir=nuitka_build --output-filename=PDFMerger.exe source/main.py
          cp -r "$PYMUPDF_DIR" "nuitka_build/main.dist/pymupdf"
          cp -r "$FITZ_DIR" "nuitka_build/main.dist/fitz"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFMerger-Windows
          path: nuitka_build/main.dist
